name: Run tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        if: github.event_name != 'schedule'
        run: npm test
      - name: Run tests with real requests
        if: github.event_name == 'schedule'
        env:
          RUN_REAL_REQUESTS: "true"
        run: npm test
